<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>List of all Users</title>
</head>
<body>
<h1>List of All Users</h1>
<a th:href="@{/}">Back to Home page</a><br><br>
<a th:href="@{/users/create}">Create a New User</a>
<ul>
    <li th:each="user: ${users}">
        <a th:text="${user.name}" th:href="@{'/users/' + ${user.id}}"></a>
    </li>
</ul>
</body>
</html>
