<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Detail of the Item</title>
</head>
<body>
<h1>Detail of the Item</h1>
<a th:href="@{/}">Back to the List of all Items</a>
<br><br>
<form method="post" th:action="@{/items/save}" th:object="${item}">
<input type="hidden" th:field="*{id}">
<b>Name: </b> <input type="text" th:field="*{name}"> <br>
<b>Desription: </b> <input type="text" th:field="*{description}"> <br>

<select th:field="*{user}">
<option th:each="user: ${users}" th:text="${user.name}" th:value="${user.id}"></option>
</select>

<input type="submit" value="Save">
</form>
</body>
</html>
