<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Detail of the User</title>
</head>
<body>
<h1>Detail of the User</h1>
<a th:href="@{/}">Back to the List of all Users</a>
<br><br>
<b>Name: </b> <span th:text="${user.name}"></span> <br>
<b>Email: </b> <span th:text="${user.email}"></span> <br>
<a th:href="@{'/users/' + ${user.id} + '/edit'}">Edit User</a><br>
<a th:href="@{'/users/' + ${user.id} + '/delete'}">Delete User</a><br><br>

<span th:if="${userDTO != null}" th:text="${userDTO.name + ', ' + userDTO.password}"></span>
</body>
</html>
