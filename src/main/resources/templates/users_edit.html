<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Detail of the User</title>
</head>
<body>
<h1>Detail of the User</h1>
<a th:href="@{/}">Back to the List of all Users</a>
<br><br>
<form method="post" th:action="@{/users/save}" th:object="${user}">
<input type="hidden" th:field="*{id}">
<b>Name: </b> <input type="text" th:field="*{name}"> <br>
<b>Password: </b> <input type="password" th:field="*{password}"> <br>
<input type="submit" value="Save">
</form>
</body>
</html>
